services:
  - type: web
    name: attendance-management
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: MONGO_URI
        fromSecret: mongo-uri
      - key: VITE_GOOGLE_MAPS_API_KEY
        fromSecret: google-maps-api-key
      - key: PORT
        value: 10000